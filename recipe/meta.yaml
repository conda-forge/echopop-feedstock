{% set name = "echopop" %}
{% set version = "0.6.0" %}

package:
  name: echopop
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/echopop-{{ version }}.tar.gz
  sha256: c3dbc453da300c0e3c668a7f071dde37d8435639cb35e911ceacb0894ef3de9d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=48
    - setuptools-scm >=4,<6
    - setuptools_scm_git_archive
    - wheel >=0.29.0
    - pip
  run:
    - python >={{ python_min }}
    - awkward
    - bokeh
    - cartopy
    - geopandas
    - geopy
    - geoviews
    - holoviews
    - hvplot
    - ipympl
    - ipywidgets
    - matplotlib-base
    - jupyter_bokeh >=3.0.5
    - lmfit
    - numba >=0.63.0b1
    - numpy
    - openpyxl
    - pandas
    - pandera >=0.25
    - pyarrow
    - pydantic >=2.0.0
    - pyproj
    - scipy
    - seaborn
    - shapely
    - traitlets
    - verde
    - xarray >=2026.01.0

test:
  imports:
    - echopop
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/OSOceanAcoustics/echopop
  summary: A tool to generate biological estimates from acoustic data collected from echosounders
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://echopop.readthedocs.io/en/latest/
  dev_url: https://github.com/OSOceanAcoustics/echopop

extra:
  recipe-maintainers:
    - leewujung
    - brandynlucca
